<!DOCTYPE html>
<html>
<head>
<title>Booking</title>
<link rel="stylesheet" href="style.css">
<style>
  .form input, .form select, .form textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 16px;
    box-sizing: border-box;
  }
  
  .form button {
    background-color: #ff6b6b;
    color: white;
    padding: 12px 30px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
  }
  
  .form button:hover {
    background-color: #ff5252;
  }
  
  .form-group {
    margin-bottom: 15px;
  }
  
  .form label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
  }
  
  .success-message {
    display: none;
    background-color: #4CAF50;
    color: white;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 5px;
  }
</style>
</head>
<body>
<div class="page">
<h1>Booking Request</h1>

<div class="success-message" id="successMessage">
  ✅ Thank you! Your booking request has been received. We'll contact you soon!
</div>

<form class="form" id="bookingForm" action="https://formspree.io/f/xeenvkyl" method="POST">
  
  <div class="form-group">
    <label for="fullName">Full Name *</label>
    <input type="text" id="fullName" name="Full Name" placeholder="Enter your full name" required>
  </div>

  <div class="form-group">
    <label for="phone">Phone Number *</label>
    <input type="tel" id="phone" name="Phone Number" placeholder="Enter your phone number" required>
  </div>

  <div class="form-group">
    <label for="email">Email Address *</label>
    <input type="email" id="email" name="Email" placeholder="Enter your email" required>
  </div>

  <div class="form-group">
    <label for="carPreference">Car Preference *</label>
    <select id="carPreference" name="Car Preference" required>
      <option value="">Select a car</option>
      <option value="Luxury Sedan">Luxury Sedan</option>
      <option value="SUV">SUV</option>
      <option value="Economy">Economy</option>
      <option value="Sports Car">Sports Car</option>
      <option value="Van">Van</option>
      <option value="Other">Other</option>
    </select>
  </div>

  <div class="form-group">
    <label for="rentalDate">Rental Start Date *</label>
    <input type="date" id="rentalDate" name="Rental Start Date" required>
  </div>

  <div class="form-group">
    <label for="returnDate">Rental Return Date *</label>
    <input type="date" id="returnDate" name="Rental Return Date" required>
  </div>

  <div class="form-group">
    <label for="driverLicense">Driver's License Number *</label>
    <input type="text" id="driverLicense" name="Driver's License Number" placeholder="Enter your driver's license number" required>
  </div>

  <div class="form-group">
    <label for="additionalDetails">Additional Details (Optional)</label>
    <textarea id="additionalDetails" name="Additional Details" placeholder="Any special requests or details..." rows="4"></textarea>
  </div>

  <button type="submit">Submit Booking</button>
</form>

<p style="margin-top: 20px; text-align: center;">
  <strong>Or book through WhatsApp:</strong><br>
  <a class="btn" href="https://wa.me/18763969303">📱 Book Through WhatsApp</a>
</p>
</div>

<script>
  // Form submission handling
  document.getElementById('bookingForm').addEventListener('submit', function(e) {
    // Formspree will handle the submission
    // Just show success message after a delay
    setTimeout(() => {
      document.getElementById('successMessage').style.display = 'block';
    }, 500);
  });
</script>
</body>
</html>
